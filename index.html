<!DOCTYPE html>
<html>
<head>
  <title>Trading Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    .label {
      font-size: 12px;
      color: #94a3b8;
    }

    .value {
      font-size: 20px;
      font-weight: bold;
    }

    .green { color: #22c55e; }
    .red { color: #ef4444; }

    .trades {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    .trade {
      padding: 5px 0;
      border-bottom: 1px solid #334155;
    }

    .buy { color: #22c55e; }
    .sell { color: #ef4444; }

    .status {
      margin-bottom: 15px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <h1>📊 Trading Dashboard</h1>

  <div class="status" id="status">Loading...</div>

  <div class="grid">
    <div class="card">
      <div class="label">Account Value</div>
      <div class="value" id="account">$-</div>
    </div>

    <div class="card">
      <div class="label">PnL</div>
      <div class="value" id="pnl">$-</div>
    </div>

    <div class="card">
      <div class="label">Positions</div>
      <div class="value" id="positions">-</div>
    </div>
  </div>

  <div class="trades">
    <h3>Recent Trades</h3>
    <div id="trades"></div>
  </div>
<script>
  const STARTING_BALANCE = 1000000;

  let lastAccountValue = null;

  async function loadData() {
    try {
      const res = await fetch(`dashboard.json?t=${Date.now()}`);
      const data = await res.json();

      // ---- Status / heartbeat ----
      document.getElementById("status").innerHTML =
        `🟢 Running | Last update: ${data.timestamp}`;

      // ---- Account ----
      if (data.account_value != null) {
        lastAccountValue = data.account_value;
      }

      const account = lastAccountValue;
      const accountEl = document.getElementById("account");

      if (account == null) {
        accountEl.innerText = "Loading...";
      } else {
        accountEl.innerText =
          `$${account.toLocaleString(undefined, {maximumFractionDigits: 2})}`;
      }

      // ---- PnL ----
      const pnlEl = document.getElementById("pnl");

      if (account == null) {
        pnlEl.innerText = "Loading...";
        pnlEl.className = "value";
      } else {
        const pnl = account - STARTING_BALANCE;
        pnlEl.innerText =
          `$${pnl.toLocaleString(undefined, {maximumFractionDigits: 2})}`;
        pnlEl.className = "value " + (pnl >= 0 ? "green" : "red");
      }

      // ---- Positions ----
      const posEl = document.getElementById("positions");
      if (!data.positions || data.positions.length === 0) {
        posEl.innerText = "None";
      } else {
        posEl.innerText = data.positions.map(p => {
          const side = p.quantity > 0 ? "Long" : "Short";
          return `${p.symbol}: ${side} ${Math.abs(p.quantity).toLocaleString()}`;
        }).join(" | ");
      }

      // ---- Trades ----
      const tradesEl = document.getElementById("trades");
      tradesEl.innerHTML = "";

      (data.recent_trades || []).forEach(t => {
        const div = document.createElement("div");
        div.className = "trade " + (t.side === "buy" ? "buy" : "sell");

        div.innerText =
          `${t.side.toUpperCase()} ${t.symbol} ` +
          `${t.quantity.toLocaleString()} @ ${t.price}`;

        tradesEl.appendChild(div);
      });

    } catch (err) {
      document.getElementById("status").innerText =
        "⚠️ Waiting for data...";
    }
  }

  loadData();
  setInterval(loadData, 5000);
</script>
</body>
</html>
